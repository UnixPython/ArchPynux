# System Hardening (Network & Kernel) — `99-hardened.conf`

## Overview

`99-hardened.conf` defines a set of **security-focused sysctl parameters** used in ArchPynux to reduce the attack surface of the system at both:

* Network stack level
* Kernel behavior level

Location:

```
/etc/sysctl.d/99-hardened.conf
```

This file is loaded at boot by `systemd-sysctl` and is designed to enforce **secure defaults out-of-the-box**, especially for:

* Development environments
* Workstations exposed to untrusted networks
* Hardened systems

---

## ⚠️ Important: Syntax Corrections

Your original configuration contains a typo:

```conf
net.ipv4.conf,all.rp_rilter = 1
```

Correct version:

```conf
net.ipv4.conf.all.rp_filter = 1
```

---

## Full Configuration (Corrected)

```conf
# Disable ICMP redirects (IPv4 & IPv6)
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# Disable sending ICMP redirects
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Enable reverse path filtering (anti-spoofing)
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Disable source routing
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# SYN flood protection
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_max_syn_backlog = 2048
net.ipv4.tcp_synack_retries = 2
net.ipv4.tcp_syn_retries = 5

# Kernel hardening
kernel.dmesg_restrict = 1
kernel.sysrq = 0
kernel.randomize_va_space = 2
```

---

## Network Hardening

### Disable ICMP Redirect Acceptance

```conf
net.ipv4.conf.*.accept_redirects = 0
net.ipv6.conf.*.accept_redirects = 0
```

#### Description

Prevents the system from accepting ICMP redirect messages from routers.

#### Security Impact

* Mitigates **Man-in-the-Middle (MITM)** attacks
* Prevents malicious route injection

#### Why it matters

Attackers can spoof ICMP redirects to:

* Reroute traffic
* Intercept sensitive data

Disabling this ensures routing decisions remain under local control.

---

### Disable ICMP Redirect Sending

```conf
net.ipv4.conf.*.send_redirects = 0
```

#### Description

Prevents the system from acting as a router and sending redirect messages.

#### Security Impact

* Reduces unintended network exposure
* Prevents misuse in misconfigured environments

---

### Reverse Path Filtering (`rp_filter`)

```conf
net.ipv4.conf.*.rp_filter = 1
```

#### Description

Enables source validation by verifying that incoming packets use valid routing paths.

#### Security Impact

* Protects against **IP spoofing attacks**
* Drops packets with invalid source addresses

#### Modes

* `0` → Disabled
* `1` → Strict mode (recommended)
* `2` → Loose mode (for complex routing setups)

#### Notes

Strict mode may break:

* Advanced routing
* VPN configurations with asymmetric routes

---

### Disable Source Routing

```conf
net.ipv4.conf.*.accept_source_route = 0
```

#### Description

Disables packets that specify their own routing path.

#### Security Impact

* Prevents attackers from bypassing routing policies
* Blocks legacy and insecure networking features

---

## TCP Hardening (SYN Flood Protection)

### Enable SYN Cookies

```conf
net.ipv4.tcp_syncookies = 1
```

#### Description

Activates SYN cookies to handle TCP connection floods.

#### Security Impact

* Protects against **SYN flood DoS attacks**

---

### Increase SYN Backlog

```conf
net.ipv4.tcp_max_syn_backlog = 2048
```

#### Description

Defines the maximum number of queued connection requests.

#### Effect

* Improves resilience under high connection load

---

### Reduce SYN-ACK Retries

```conf
net.ipv4.tcp_synack_retries = 2
```

#### Description

Number of retries for SYN-ACK packets.

#### Effect

* Faster cleanup of half-open connections
* Reduces resource exhaustion

---

### Configure SYN Retries

```conf
net.ipv4.tcp_syn_retries = 5
```

#### Description

Number of retries before aborting outbound connections.

#### Trade-off

* Lower = faster failure detection
* Higher = better reliability on unstable networks

---

## Kernel Hardening

### Restrict `dmesg`

```conf
kernel.dmesg_restrict = 1
```

#### Description

Limits access to kernel logs.

#### Security Impact

* Prevents information leakage to unprivileged users
* Protects kernel memory layout data

---

### Disable SysRq

```conf
kernel.sysrq = 0
```

#### Description

Disables magic SysRq key functionality.

#### Security Impact

* Prevents low-level system control via keyboard
* Important on shared or physical-access systems

---

### Enable ASLR

```conf
kernel.randomize_va_space = 2
```

#### Description

Enables full **Address Space Layout Randomization (ASLR)**.

#### Modes

* `0` → Disabled
* `1` → Partial
* `2` → Full (recommended)

#### Security Impact

* Mitigates:

  * Buffer overflow attacks
  * Memory corruption exploits

---

## Combined Security Impact

This configuration provides:

* Network-level attack mitigation
* Protection against spoofing and MITM
* Resistance to SYN flood attacks
* Reduced kernel information exposure
* Strong memory protection via ASLR

---

## Compatibility Considerations

Users may need to adjust settings if using:

| Feature        | Potential Issue                        |
| -------------- | -------------------------------------- |
| VPNs           | `rp_filter` may drop valid packets     |
| Custom routing | Strict filtering may break traffic     |
| Containers     | Some kernel restrictions may interfere |

---

## Applying the Configuration

```bash
sysctl --system
```

Verify:

```bash
sysctl net.ipv4.conf.all.rp_filter
sysctl kernel.randomize_va_space
```

---

## Additional Hardening (Optional)

Users may extend:

```conf
kernel.kptr_restrict = 2
kernel.unprivileged_bpf_disabled = 1
net.core.bpf_jit_harden = 2
```

